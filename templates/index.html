<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PhishGuard</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html, body {
    height: 100%;
}

/* 🔥 TRUE CENTER FIX */
body {
    display: grid;
    place-items: center;   /* 💥 BEST METHOD */
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #020617, #0f172a);
    color: white;
}

/* 🔥 Animated background */
body::before {
    content: "";
    position: absolute;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, #38bdf8 1px, transparent 1px);
    background-size: 40px 40px;
    animation: moveBg 20s linear infinite;
    opacity: 0.1;
    z-index: 0;
}

@keyframes moveBg {
    from { transform: translate(0,0); }
    to { transform: translate(-200px, -200px); }
}

/* Container */
.container {
    text-align: center;
    z-index: 1;
}

/* Title */
h1 {
    font-size: 3rem;
    color: #38bdf8;
    text-shadow: 0 0 20px #38bdf8;
    margin-bottom: 20px;
}

/* Glass Card */
.card {
    padding: 30px;
    border-radius: 20px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(15px);
    box-shadow: 0 0 30px rgba(56,189,248,0.2);

    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
}

/* Input */
input {
    width: 320px;
    padding: 12px;
    border-radius: 10px;
    border: none;
    outline: none;
    font-size: 16px;
    background: rgba(255,255,255,0.1);
    color: white;
}

/* Button */
button {
    padding: 12px 25px;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    cursor: pointer;
    background: linear-gradient(45deg, #38bdf8, #0ea5e9);
    color: black;
    font-weight: bold;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px #38bdf8;
}
</style>
</head>

<body>

<div class="container">
    <h1>🛡️ PhishGuard</h1>

    <div class="card">
        <input type="text" placeholder="Enter URL...">
        <button>Scan Now</button>
    </div>
</div>

</body>
</html>
