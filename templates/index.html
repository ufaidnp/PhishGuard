<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PhishGuard</title>

<style>
html, body {
    height: 100%;
    margin: 0;
    padding: 0;
}

body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #020617, #0f172a);
    color: white;

    /* 🔥 PERFECT CENTER FIX */
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}

/* 🔥 Animated Grid Background */
body::before {
    content: "";
    position: absolute;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, #38bdf8 1px, transparent 1px);
    background-size: 40px 40px;
    animation: moveBg 20s linear infinite;
    opacity: 0.1;
    z-index: 0;
}

@keyframes moveBg {
    from { transform: translate(0,0); }
    to { transform: translate(-200px, -200px); }
}

/* Container */
.container {
    text-align: center;
    z-index: 1;
}

/* Title */
h1 {
    font-size: 3rem;
    color: #38bdf8;
    text-shadow: 0 0 20px #38bdf8;
    margin-bottom: 20px;
}

/* Glass Card */
.card {
    padding: 30px;
    border-radius: 20px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(15px);
    box-shadow: 0 0 30px rgba(56,189,248,0.2);

    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;

    animation: fadeIn 0.8s ease-in-out;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

/* Input */
input {
    width: 320px;
    padding: 12px;
    border-radius: 10px;
    border: none;
    outline: none;
    font-size: 16px;
    background: rgba(255,255,255,0.1);
    color: white;
}

/* Button */
button {
    padding: 12px 25px;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    cursor: pointer;
    background: linear-gradient(45deg, #38bdf8, #0ea5e9);
    color: black;
    font-weight: bold;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px #38bdf8;
}

/* Result */
.result-box {
    margin-top: 20px;
    padding: 20px;
    border-radius: 15px;
    display: none;
    animation: fadeIn 0.5s ease-in-out;
    min-width: 300px;
}

.safe {
    background: rgba(34,197,94,0.1);
    box-shadow: 0 0 20px #22c55e;
}

.phishing {
    background: rgba(239,68,68,0.1);
    box-shadow: 0 0 20px #ef4444;
}

/* Loading */
.loading {
    color: #facc15;
    animation: blink 1s infinite;
}

@keyframes blink {
    50% { opacity: 0.5; }
}
</style>
</head>

<body>

<div class="container">
    <h1>🛡️ PhishGuard</h1>

    <div class="card">
        <input type="text" id="urlInput" placeholder="Enter URL...">
        <button onclick="checkURL()">Scan Now</button>

        <div id="loading" class="loading"></div>

        <div id="resultBox" class="result-box">
            <h2 id="result"></h2>
            <p id="confidence"></p>
            <p id="details"></p>
        </div>
    </div>
</div>

<script>
async function checkURL() {
    const url = document.getElementById("urlInput").value;
    const loading = document.getElementById("loading");
    const resultBox = document.getElementById("resultBox");

    loading.innerText = "⚡ Scanning...";
    resultBox.style.display = "none";

    try {
        const response = await fetch("/predict", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ url: url })
        });

        const data = await response.json();

        loading.innerText = "";
        resultBox.style.display = "block";

        document.getElementById("result").innerText = data.result;
        document.getElementById("confidence").innerText = "Confidence: " + data.confidence + "%";
        document.getElementById("details").innerText = data.details;

        if (data.result === "Phishing") {
            resultBox.className = "result-box phishing";
        } else {
            resultBox.className = "result-box safe";
        }

    } catch (error) {
        loading.innerText = "❌ Server error";
    }
}
</script>

</body>
</html>
