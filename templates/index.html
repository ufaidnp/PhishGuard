<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PhishGuard</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

html,body{
    height:100%;
    overflow:hidden;
}

body{
    display:grid;
    place-items:center;
    background:#020617;
    font-family:'Consolas', monospace;
    color:#00ff9f;
}

/* 🌫️ BACKGROUND FOG */
body::before{
    content:"";
    position:absolute;
    width:200%;
    height:200%;
    background: radial-gradient(circle, rgba(255,255,255,0.04), transparent 70%);
    animation:fogMove 30s linear infinite;
}

@keyframes fogMove{
    from{transform:translate(0,0);}
    to{transform:translate(-300px,-300px);}
}

/* 🌫️ CLEAR SMOKE */
.smoke-container{
    position:fixed;
    bottom:0;
    width:100%;
    height:50%;
    pointer-events:none;
    z-index:1;
}

.smoke{
    position:absolute;
    bottom:-50px;
    width:300px;
    height:150px;
    background: radial-gradient(ellipse at center,
        rgba(255,255,255,0.04),
        rgba(255,255,255,0.02),
        transparent);
    border-radius:50%;
    filter:blur(60px);
    animation:smokeRise 15s ease-in-out infinite;
}

.smoke:nth-child(1){left:10%;}
.smoke:nth-child(2){left:30%;}
.smoke:nth-child(3){left:50%;}
.smoke:nth-child(4){left:70%;}
.smoke:nth-child(5){left:90%;}

@keyframes smokeRise{
    0%{transform:translateY(0) scale(1);opacity:0.15;}
    50%{opacity:0.25;}
    100%{transform:translateY(-400px) scale(1.5);opacity:0;}
}

/* 🌧️ RAIN */
.rain{
    position:fixed;
    width:100%;
    height:100%;
}

.drop{
    position:absolute;
    width:2px;
    height:20px;
    background:rgba(0,255,159,0.25);
    animation:fall linear infinite;
}

@keyframes fall{
    to{transform:translateY(100vh);}
}

/* ⚡ LIGHTNING */
#lightningCanvas{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    pointer-events:none;
    z-index:2;
}

/* 📳 SHAKE */
.shake{
    animation:shake 0.3s;
}

@keyframes shake{
    0%{transform:translate(0,0);}
    25%{transform:translate(4px,-4px);}
    50%{transform:translate(-4px,4px);}
    75%{transform:translate(4px,4px);}
    100%{transform:translate(0,0);}
}

/* 💎 UI */
.container{
    z-index:3;
    text-align:center;
}

h1{
    font-size:3rem;
    text-shadow:0 0 20px #00ff9f;
    margin-bottom:20px;
}

.card{
    padding:30px;
    border-radius:20px;
    background:rgba(0,255,159,0.05);
    backdrop-filter:blur(12px);
    border:1px solid rgba(0,255,159,0.2);
    box-shadow:0 0 30px rgba(0,255,159,0.2);

    display:flex;
    flex-direction:column;
    gap:12px;
    align-items:center;
}

input{
    width:320px;
    padding:12px;
    border-radius:10px;
    border:none;
    background:rgba(0,255,159,0.1);
    color:#00ff9f;
}

button{
    padding:12px 25px;
    border:none;
    border-radius:10px;
    background:#00ff9f;
    color:black;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    transform:scale(1.1);
    box-shadow:0 0 20px #00ff9f;
}

.result-box{
    margin-top:15px;
    padding:15px;
    border-radius:10px;
    display:none;
}

.safe{border:1px solid #00ff9f;}
.phishing{border:1px solid red;color:red;}
</style>
</head>

<body>

<div class="rain" id="rain"></div>

<div class="smoke-container">
    <span class="smoke"></span>
    <span class="smoke"></span>
    <span class="smoke"></span>
    <span class="smoke"></span>
    <span class="smoke"></span>
</div>

<canvas id="lightningCanvas"></canvas>

<div class="container">
    <h1>🛡️ PhishGuard</h1>

    <div class="card">
        <input type="text" id="urlInput" placeholder="Enter URL...">
        <button onclick="checkURL()">Scan Now</button>

        <div id="resultBox" class="result-box">
            <h2 id="result"></h2>
            <p id="confidence"></p>
            <p id="details"></p>
        </div>
    </div>
</div>

<script>

/* 🌧️ RAIN */
const rain=document.getElementById("rain");
for(let i=0;i<120;i++){
    let d=document.createElement("div");
    d.classList.add("drop");
    d.style.left=Math.random()*100+"vw";
    d.style.animationDuration=(Math.random()+0.5)+"s";
    rain.appendChild(d);
}

/* ⚡ LIGHTNING */
const canvas=document.getElementById("lightningCanvas");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

function drawLightning(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.strokeStyle="white";
    ctx.lineWidth=2;

    let x=Math.random()*canvas.width;
    let y=0;

    ctx.beginPath();
    ctx.moveTo(x,y);

    while(y<canvas.height){
        x+=(Math.random()-0.5)*30;
        y+=Math.random()*20;
        ctx.lineTo(x,y);
    }

    ctx.stroke();

    setTimeout(()=>ctx.clearRect(0,0,canvas.width,canvas.height),120);

    document.body.classList.add("shake");
    setTimeout(()=>document.body.classList.remove("shake"),200);
}

setInterval(()=>{
    if(Math.random()>0.7){
        drawLightning();
    }
},2000);

/* 🔘 BUTTON */
async function checkURL(){
    const url=document.getElementById("urlInput").value;

    if(!url){
        alert("Enter URL bro 😅");
        return;
    }

    const res=await fetch("/predict",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({url:url})
    });

    const data=await res.json();

    const box=document.getElementById("resultBox");
    box.style.display="block";

    document.getElementById("result").innerText=data.result;
    document.getElementById("confidence").innerText="Confidence: "+data.confidence+"%";
    document.getElementById("details").innerText=data.details;

    if(data.result==="Phishing"){
        box.className="result-box phishing";
    } else {
        box.className="result-box safe";
    }
}
</script>

</body>
</html>
